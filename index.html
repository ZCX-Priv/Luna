<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Luna - 温暖治愈的 AI 伴侣，如一封温柔的信">
    <meta name="theme-color" content="#c9a86c">
    <title>Luna - 书写温暖</title>
    
    <!-- Google Fonts - 中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- MathJax 数学公式渲染 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    
    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/components.css">
    
    <!-- 图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%23dfc99a'/><stop offset='100%25' style='stop-color:%23c9a86c'/></linearGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><circle cx='38' cy='42' r='5' fill='white' opacity='0.9'/><circle cx='62' cy='42' r='5' fill='white' opacity='0.9'/><path d='M35 58 Q50 72 65 58' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' opacity='0.9'/></svg>">
    
    <style>
        /* 侧边栏样式 */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(74, 63, 53, 0.15);
            opacity: 0;
            visibility: hidden;
            transition: opacity 180ms ease-out, visibility 180ms ease-out;
            z-index: 999;
        }
        
        .sidebar-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            max-width: 85vw;
            height: 100vh;
            background: var(--color-paper);
            box-shadow: 
                4px 0 20px rgba(0, 0, 0, 0.08),
                8px 0 40px rgba(0, 0, 0, 0.04);
            transform: translateX(-100%);
            transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            will-change: transform;
            backface-visibility: hidden;
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, 
                var(--color-primary-light), 
                var(--color-primary), 
                var(--color-rose), 
                var(--color-primary), 
                var(--color-primary-light)
            );
        }
        
        .sidebar-header {
            padding: var(--spacing-lg) var(--paper-padding);
            border-bottom: 1px solid var(--color-line);
            position: relative;
        }
        
        .sidebar-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--paper-padding);
            right: var(--paper-padding);
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--color-line-dark), 
                transparent
            );
        }
        
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-sm);
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--color-ink-light);
            border: 1px solid transparent;
            margin-bottom: var(--spacing-xs);
        }
        
        .conversation-item:hover {
            background: var(--color-paper-dark);
            color: var(--color-ink);
            border-color: var(--color-line);
        }
        
        .conversation-item.active {
            background: linear-gradient(135deg, #fff9f5, #fff5ef);
            color: var(--color-ink);
            border-color: rgba(212, 165, 116, 0.3);
        }
        
        .conversation-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.6;
        }
        
        .conversation-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-serif);
            font-size: var(--font-size-sm);
        }
        
        .conversation-edit-btn,
        .conversation-delete-btn {
            width: 24px;
            height: 24px;
            padding: 4px;
            border: none;
            background: transparent;
            color: var(--color-ink-pale);
            border-radius: var(--radius-sm);
            cursor: pointer;
            opacity: 0;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .conversation-edit-btn svg,
        .conversation-delete-btn svg {
            width: 14px;
            height: 14px;
        }
        
        .conversation-item:hover .conversation-edit-btn,
        .conversation-item:hover .conversation-delete-btn {
            opacity: 1;
        }
        
        .conversation-edit-btn:hover {
            background: rgba(201, 168, 108, 0.2);
            color: var(--color-primary);
        }
        
        .conversation-delete-btn:hover {
            background: rgba(180, 100, 100, 0.15);
            color: #b46464;
        }
        
        .no-conversations {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-ink-pale);
            font-family: var(--font-serif);
            font-size: var(--font-size-sm);
            font-style: italic;
        }
        
        /* 装饰性花纹 SVG */
        .decor-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.15;
            pointer-events: none;
        }
        
        .decor-corner.top-left {
            top: var(--spacing-lg);
            left: var(--spacing-lg);
        }
        
        .decor-corner.top-right {
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            transform: scaleX(-1);
        }
        
        .decor-corner.bottom-left {
            bottom: var(--spacing-lg);
            left: var(--spacing-lg);
            transform: scaleY(-1);
        }
        
        .decor-corner.bottom-right {
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            transform: scale(-1);
        }
    </style>
</head>
<body>
    <!-- 装饰性花纹 -->
    <svg class="decor-corner top-left" viewBox="0 0 60 60" fill="none">
        <path d="M0 60 C20 60, 30 50, 30 30 C30 10, 40 0, 60 0" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M0 45 C15 45, 22 38, 22 22 C22 6, 29 0, 45 0" stroke="currentColor" stroke-width="1" fill="none" opacity="0.3"/>
        <circle cx="15" cy="45" r="2" fill="currentColor" opacity="0.4"/>
        <circle cx="45" cy="15" r="2" fill="currentColor" opacity="0.4"/>
    </svg>
    
    <!-- 主布局容器 -->
    <div class="main-layout">
        <!-- 左侧人物画像区域 -->
        <div class="character-panel">
            <div class="character-frame">
                <div class="character-avatar">
                    <img src="luna-avatar.jpg" alt="Luna">
                </div>
                <div class="character-name">Luna</div>
                <div class="character-quote">"愿你被世界温柔以待"</div>
            </div>
            <!-- 装饰元素 -->
            <div class="character-decor">
                <svg viewBox="0 0 40 40" fill="none">
                    <path d="M20 5 Q25 15 35 20 Q25 25 20 35 Q15 25 5 20 Q15 15 20 5" fill="url(#dressGrad)" opacity="0.3"/>
                </svg>
            </div>
        </div>
        
        <!-- 右侧信筏区域 -->
        <div class="app-container">
        <!-- 头部 -->
        <header class="app-header">
            <div class="header-left">
                <!-- 菜单按钮 -->
                <button id="menu-btn" class="btn btn-icon" aria-label="打开菜单">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="16" rx="2"/>
                        <line x1="7" y1="9" x2="17" y2="9"/>
                        <line x1="7" y1="13" x2="17" y2="13"/>
                        <line x1="7" y1="17" x2="12" y2="17"/>
                    </svg>
                </button>
                
                <!-- 标题 -->
                <div class="header-title">
                    <img src="luna-avatar.jpg" alt="Luna" class="header-avatar">
                    <span>Luna</span>
                </div>
            </div>
            
            <div class="header-actions">
                <!-- 设置按钮 -->
                <button id="settings-btn" class="btn btn-icon" aria-label="设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </header>
        
        <!-- 侧边栏 -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="width: 16px; height: 16px;">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span style="margin-left: 6px;">新的信筏</span>
                </button>
            </div>
            
            <div id="conversation-list" class="conversation-list">
                <!-- 对话列表动态生成 -->
            </div>
        </aside>
        
        <!-- 聊天区域 -->
        <main class="chat-container">
            <!-- 消息容器 -->
            <div id="messages-container">
                <!-- 加载状态 -->
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="message-input" 
                        placeholder="写下你想说的话..." 
                        rows="1"
                        aria-label="输入消息"
                    ></textarea>
                    <button id="send-button" class="btn-icon" aria-label="发送">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M22 2L11 13"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    </div><!-- main-layout -->
    
    <!-- 设置面板 -->
    <div id="settings-overlay"></div>
    <aside id="settings-panel">
        <div class="settings-header">
            <h2 class="settings-title">设置</h2>
            <button id="close-settings" class="btn-icon" aria-label="关闭">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        
        <div class="settings-content">
            <!-- 关于 Luna -->
            <div class="settings-section">
                <div class="about-decor">
                    <svg class="about-logo" viewBox="0 0 32 32" fill="currentColor">
                        <defs>
                            <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#dfc99a"/>
                                <stop offset="100%" style="stop-color:#a68b4d"/>
                            </linearGradient>
                        </defs>
                        <circle cx="16" cy="16" r="14" fill="url(#aboutGrad)"/>
                        <circle cx="11" cy="13" r="2.5" fill="white" opacity="0.9"/>
                        <circle cx="21" cy="13" r="2.5" fill="white" opacity="0.9"/>
                        <path d="M9 20 Q16 27 23 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
                    </svg>
                    <p class="about-text">温暖治愈的 AI 伴侣<br>如一封永远温柔的信</p>
                </div>
            </div>
            
            <!-- API 设置 -->
            <div class="settings-section">
                <h3 class="settings-section-title">API 配置</h3>
                <div class="settings-item">
                    <label class="settings-label">Pollinations API Key</label>
                    <p class="settings-description">输入你的 API Key 以解锁完整功能</p>
                    <input 
                        type="password" 
                        id="api-key-input" 
                        class="settings-input" 
                        placeholder="sk_..."
                    >
                    <div class="settings-actions">
                        <button id="save-api-key-btn" class="btn btn-primary">保存密钥</button>
                    </div>
                </div>
            </div>
            
            <!-- 模型设置 -->
            <div class="settings-section">
                <h3 class="settings-section-title">模型配置</h3>
                <div class="settings-item">
                    <label class="settings-label">文本模型</label>
                    <p class="settings-description">选择对话使用的文本生成模型</p>
                    <select id="text-model-select" class="settings-select">
                        <!-- 动态加载选项 -->
                    </select>
                </div>
                <div class="settings-item">
                    <label class="settings-label">图片模型</label>
                    <p class="settings-description">选择图片生成的风格模型</p>
                    <select id="image-model-select" class="settings-select">
                        <!-- 动态加载选项 -->
                    </select>
                </div>
            </div>
            
            <!-- 生成参数 -->
            <div class="settings-section">
                <h3 class="settings-section-title">生成参数</h3>
                <div class="settings-item">
                    <div class="settings-slider-header">
                        <label class="settings-label">温度 (Temperature)</label>
                        <span id="temperature-value" class="settings-slider-value">0.7</span>
                    </div>
                    <p class="settings-description">控制回复的随机性。值越高回复越有创意，值越低回复越稳定</p>
                    <input 
                        type="range" 
                        id="temperature-slider" 
                        class="settings-slider" 
                        min="0" 
                        max="2" 
                        step="0.1" 
                        value="0.7"
                    >
                    <div class="settings-slider-labels">
                        <span>精确</span>
                        <span>创意</span>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-slider-header">
                        <label class="settings-label">Top P</label>
                        <span id="top-p-value" class="settings-slider-value">0.9</span>
                    </div>
                    <p class="settings-description">核采样参数。控制模型考虑的词汇范围，值越低回复越保守</p>
                    <input 
                        type="range" 
                        id="top-p-slider" 
                        class="settings-slider" 
                        min="0" 
                        max="1" 
                        step="0.05" 
                        value="0.9"
                    >
                    <div class="settings-slider-labels">
                        <span>保守</span>
                        <span>多样</span>
                    </div>
                </div>
            </div>
            
            <!-- 危险区域 -->
            <div class="settings-section settings-danger">
                <h3 class="settings-section-title">数据管理</h3>
                <button id="clear-data-btn" class="btn btn-danger">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    <span>清空所有数据</span>
                </button>
            </div>
        </div>
        
        <div class="settings-footer">
            Luna v1.0 · 书写温暖
        </div>
    </aside>
    
    <!-- 脚本 -->
    <!-- Highlight.js 代码高亮 (包含常用语言的打包版本) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
